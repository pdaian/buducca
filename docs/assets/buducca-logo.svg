<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BUDUCCA rainbow turtle logo</title>
  <desc id="desc">A cartoony stuffed turtle in a lush forest with a rainbow banner reading BUDUCCA.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ee9ff"/>
      <stop offset="100%" stop-color="#d5fff0"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#73cf6b"/>
      <stop offset="100%" stop-color="#2f9644"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6bb7"/>
      <stop offset="20%" stop-color="#ff9f43"/>
      <stop offset="40%" stop-color="#ffe66d"/>
      <stop offset="60%" stop-color="#65e572"/>
      <stop offset="80%" stop-color="#67b7ff"/>
      <stop offset="100%" stop-color="#b084ff"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fdf0a5"/>
      <stop offset="100%" stop-color="#ffe0a6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2b5d31" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#sky)"/>

  <!-- distant trees -->
  <g opacity="0.45">
    <circle cx="110" cy="210" r="88" fill="#6bc487"/>
    <circle cx="190" cy="190" r="78" fill="#5cb674"/>
    <circle cx="310" cy="200" r="96" fill="#66bf82"/>
    <circle cx="990" cy="210" r="88" fill="#6bc487"/>
    <circle cx="1070" cy="190" r="78" fill="#5cb674"/>
    <circle cx="890" cy="200" r="96" fill="#66bf82"/>
  </g>

  <rect y="250" width="1200" height="170" fill="url(#grass)"/>

  <!-- rainbow arch -->
  <g fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M 260 250 A 340 220 0 0 1 940 250" stroke="#ff5f73" stroke-width="20"/>
    <path d="M 280 252 A 320 200 0 0 1 920 252" stroke="#ff9f43" stroke-width="18"/>
    <path d="M 300 254 A 300 180 0 0 1 900 254" stroke="#ffe66d" stroke-width="16"/>
    <path d="M 320 256 A 280 160 0 0 1 880 256" stroke="#65e572" stroke-width="14"/>
    <path d="M 340 258 A 260 140 0 0 1 860 258" stroke="#5ed8ff" stroke-width="12"/>
    <path d="M 360 260 A 240 120 0 0 1 840 260" stroke="#b084ff" stroke-width="10"/>
  </g>

  <!-- plush turtle -->
  <g transform="translate(600 268)" filter="url(#soft)">
    <ellipse cx="0" cy="62" rx="175" ry="56" fill="#2d7f3b" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="170" ry="102" fill="url(#shell)" stroke="#3f6e48" stroke-width="7"/>

    <!-- shell stitching -->
    <g fill="none" stroke="#fff6d6" stroke-width="6" stroke-linecap="round" opacity="0.85">
      <path d="M -100 -10 Q -55 -55 0 -10 Q 55 -55 100 -10"/>
      <path d="M -85 35 Q -45 -5 0 35 Q 45 -5 85 35"/>
      <path d="M -40 -62 Q 0 -22 40 -62"/>
    </g>

    <!-- head -->
    <ellipse cx="-178" cy="-8" rx="54" ry="48" fill="#8fe7a4" stroke="#3f6e48" stroke-width="7"/>
    <circle cx="-194" cy="-18" r="8" fill="#2f3b35"/>
    <circle cx="-162" cy="-18" r="8" fill="#2f3b35"/>
    <path d="M -196 8 Q -178 20 -160 8" fill="none" stroke="#2f3b35" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-196" cy="-21" r="2" fill="#fff"/>
    <circle cx="-164" cy="-21" r="2" fill="#fff"/>

    <!-- limbs -->
    <ellipse cx="-90" cy="78" rx="33" ry="20" fill="#8fe7a4" stroke="#3f6e48" stroke-width="6"/>
    <ellipse cx="82" cy="78" rx="33" ry="20" fill="#8fe7a4" stroke="#3f6e48" stroke-width="6"/>
    <ellipse cx="145" cy="18" rx="29" ry="20" fill="#8fe7a4" stroke="#3f6e48" stroke-width="6"/>
    <ellipse cx="-35" cy="-82" rx="24" ry="14" fill="#a7f3b8" stroke="#3f6e48" stroke-width="5"/>
  </g>

  <!-- vines and flowers -->
  <g>
    <path d="M 85 255 C 120 220, 170 220, 220 250" fill="none" stroke="#2a8b42" stroke-width="7" stroke-linecap="round"/>
    <circle cx="125" cy="233" r="10" fill="#ff7fb2"/>
    <circle cx="170" cy="225" r="10" fill="#ffdd69"/>
    <circle cx="215" cy="241" r="10" fill="#89b4ff"/>

    <path d="M 980 260 C 1020 225, 1080 230, 1120 265" fill="none" stroke="#2a8b42" stroke-width="7" stroke-linecap="round"/>
    <circle cx="1020" cy="240" r="10" fill="#ff7fb2"/>
    <circle cx="1068" cy="236" r="10" fill="#ffdd69"/>
    <circle cx="1112" cy="252" r="10" fill="#89b4ff"/>
  </g>

  <!-- banner -->
  <g transform="translate(600 88)" filter="url(#soft)">
    <path d="M -255 -40 H 255 Q 276 -40 276 -18 V 18 Q 276 40 255 40 H -255 Q -276 40 -276 18 V -18 Q -276 -40 -255 -40 Z" fill="url(#banner)" stroke="#b07a3c" stroke-width="7"/>
    <path d="M -276 -12 L -326 -38 L -326 38 L -276 12 Z" fill="#ffd28a" stroke="#b07a3c" stroke-width="7"/>
    <path d="M 276 -12 L 326 -38 L 326 38 L 276 12 Z" fill="#ffd28a" stroke="#b07a3c" stroke-width="7"/>

    <g font-family="'Comic Sans MS', 'Trebuchet MS', cursive" font-size="68" font-weight="900" text-anchor="middle" dominant-baseline="middle" stroke="#2f3b35" stroke-width="5" paint-order="stroke fill">
      <text x="-148" y="4" fill="#ff5f73">B</text>
      <text x="-88" y="4" fill="#ff9f43">U</text>
      <text x="-26" y="4" fill="#ffe66d">D</text>
      <text x="36" y="4" fill="#65e572">U</text>
      <text x="98" y="4" fill="#5ed8ff">C</text>
      <text x="158" y="4" fill="#b084ff">C</text>
      <text x="218" y="4" fill="#ff7fb2">A</text>
    </g>
  </g>
</svg>
